{% extends "base.html" %}
{% block title %}Update Profile - AURA{% endblock %}

{% block content %}
<div class="profile-edit-wrap">
  <div class="profile-edit-card">

    <div class="profile-edit-header">
      <div class="profile-edit-icon"><i class="fas fa-user-edit"></i></div>
      <h2>Update Profile</h2>
      <p>Keep your information up to date</p>
    </div>

    <div id="formFeedback" class="form-feedback" role="alert" hidden></div>
    <button type="button" id="retryBtn" class="retry-btn" hidden>Retry</button>

    <form id="updateProfileForm">
      <div class="form-field">
        <label>Username</label>
        <input type="text" name="username" value="{{ current_user.username }}" class="edit-input" placeholder="Your username" required autocomplete="username">
      </div>

      <div class="form-field">
        <label>Email Address</label>
        <input type="email" name="email" value="{{ current_user.email }}" class="edit-input" placeholder="your@email.com" required autocomplete="email">
      </div>

      <div class="form-field">
        <label>Phone Number</label>
        <input type="tel" name="phone" value="{{ current_user.phone or '' }}" class="edit-input" placeholder="+20..." autocomplete="tel">
      </div>

      <div class="form-field">
        <label>
          Date of Birth
          <span class="label-badge">Birthday Rewards</span>
        </label>
        <input type="date" name="date_of_birth" value="{{ current_user.date_of_birth.strftime('%Y-%m-%d') if current_user.date_of_birth else '' }}" class="edit-input">
      </div>

      <div class="form-field">
        <label>Default Address</label>
        <input type="text" name="address" value="{{ current_user.address or '' }}" class="edit-input" placeholder="Enter your street, city..." autocomplete="street-address">
      </div>

      <div class="form-field">
        <label>New Password <span class="label-hint">(leave blank to keep current)</span></label>
        <div class="pwd-wrap">
          <input type="password" name="password" id="passwordInput" class="edit-input" placeholder="Minimum 8 characters" autocomplete="new-password">
          <button type="button" onclick="togglePwd()" id="pwdToggle" class="pwd-toggle" aria-label="Show password">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" id="saveBtn" class="save-btn">
        <i class="fas fa-check"></i> Save Changes
      </button>

      <a href="{{ url_for('profile.view_profile') }}" class="cancel-link">← Cancel and Go Back</a>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.profile-edit-wrap{display:flex;justify-content:center;align-items:flex-start;min-height:min(80vh,100%);padding:24px 16px;padding-bottom:calc(24px + 72px + env(safe-area-inset-bottom,0px));font-family:'Plus Jakarta Sans',sans-serif}
.profile-edit-card{background:var(--cw);width:100%;max-width:480px;padding:32px 24px;border-radius:24px;box-shadow:var(--shadow-lg);border:1px solid var(--cb)}
.profile-edit-header{text-align:center;margin-bottom:24px}
.profile-edit-icon{width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px;color:#fff}
.profile-edit-header h2{font-size:24px;font-weight:800;color:var(--c1);margin:0 0 6px}
.profile-edit-header p{color:var(--cl);font-size:14px;margin:0}
.form-feedback{display:block;margin-bottom:14px;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600}
.form-feedback[data-type="success"]{background:#dcfce7;color:#16a34a}
.form-feedback[data-type="error"]{background:#fee2e2;color:#dc2626}
.form-feedback[data-type="loading"]{background:#e0e7ff;color:#4338ca}
.retry-btn{width:100%;margin-bottom:14px;padding:10px;border:1.5px solid var(--cb);border-radius:10px;background:var(--bg);font-weight:600;cursor:pointer;min-height:44px}
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:11px;font-weight:700;color:var(--cl);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.label-badge{background:#fef3c7;color:#d97706;font-size:10px;padding:2px 7px;border-radius:6px;margin-left:6px;font-weight:700;text-transform:none;letter-spacing:0}
.label-hint{font-weight:400;text-transform:none;letter-spacing:0}
.edit-input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--cb);background:var(--bg);font-size:16px;font-family:inherit;color:var(--c1);box-sizing:border-box;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.edit-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1);background:var(--cw)}
.pwd-wrap{position:relative}
.pwd-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--cl);font-size:14px;min-width:44px;min-height:44px}
.save-btn{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;min-height:48px;touch-action:manipulation}
.save-btn:disabled{opacity:.7;cursor:not-allowed}
.cancel-link{display:block;text-align:center;margin-top:16px;color:var(--cl);font-size:14px;font-weight:600;text-decoration:none;padding:8px}
@media(max-width:768px){
  .profile-edit-wrap{padding:16px 12px}
  .profile-edit-card{padding:24px 18px;border-radius:20px}
}
</style>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/account-api.js') }}"></script>
<script>
function togglePwd() {
  const inp = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function showFeedback(msg, type) {
  const el = document.getElementById('formFeedback');
  el.textContent = msg;
  el.hidden = false;
  el.dataset.type = type;
}

function hideRetry() {
  document.getElementById('retryBtn').hidden = true;
}

function showRetry() {
  document.getElementById('retryBtn').hidden = false;
}

const UPDATE_URL = "{{ url_for('profile.update_profile') }}";
const PROFILE_URL = "{{ url_for('profile.view_profile') }}";

async function submitProfileForm() {
  const form = document.getElementById('updateProfileForm');
  const btn = document.getElementById('saveBtn');
  const originalHtml = btn.innerHTML;

  hideRetry();
  showFeedback('Saving your changes…', 'loading');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
  btn.disabled = true;

  try {
    const { response, data } = await AuraAccount.postForm(UPDATE_URL, new FormData(form));

    if (response.ok && data.status === 'success') {
      showFeedback(data.message || 'Profile updated successfully!', 'success');
      btn.innerHTML = '<i class="fas fa-check"></i> Saved!';
      btn.style.background = '#16a34a';
      setTimeout(() => { window.location.href = PROFILE_URL; }, 1000);
      return;
    }

    if (response.status === 401) {
      showFeedback('Your session expired. Redirecting to sign in…', 'error');
      setTimeout(() => {
        window.location.href = "{{ url_for('auth.login') }}?next=" + encodeURIComponent(window.location.pathname);
      }, 1500);
      return;
    }

    showFeedback(data.message || 'Could not save your profile. Please check the form and try again.', 'error');
    showRetry();
    btn.innerHTML = originalHtml;
    btn.disabled = false;
    btn.style.background = '';
  } catch (error) {
    console.error('[profile] update failed:', error);
    showFeedback(AuraAccount.networkMessage(error), 'error');
    showRetry();
    btn.innerHTML = originalHtml;
    btn.disabled = false;
    btn.style.background = '';
  }
}

document.getElementById('updateProfileForm').addEventListener('submit', function(e) {
  e.preventDefault();
  submitProfileForm();
});

document.getElementById('retryBtn').addEventListener('click', submitProfileForm);
</script>
{% endblock %}
