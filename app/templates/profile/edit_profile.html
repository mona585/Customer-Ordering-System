{% extends "base.html" %}
{% block title %}Update Profile - AURA{% endblock %}

{% block content %}
<div style="display:flex;justify-content:center;align-items:center;min-height:80vh;padding:24px;">
  <div style="background:var(--cw);width:100%;max-width:480px;padding:40px;border-radius:24px;box-shadow:var(--shadow-lg);border:1px solid var(--cb);font-family:'Plus Jakarta Sans',sans-serif;">

    <div style="text-align:center;margin-bottom:30px;">
      <div style="width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px;color:white;">
        <i class="fas fa-user-edit"></i>
      </div>
      <h2 style="font-size:26px;font-weight:800;color:var(--c1);margin:0 0 6px;">Update Profile</h2>
      <p style="color:var(--cl);font-size:14px;margin:0;">Keep your information up to date</p>
    </div>

    <div id="formFeedback" style="display:none;margin-bottom:18px;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;"></div>

    <form id="updateProfileForm">
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--cl);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Username</label>
        <input type="text" name="username" value="{{ current_user.username }}" class="edit-input" placeholder="Your username">
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--cl);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Email Address</label>
        <input type="email" name="email" value="{{ current_user.email }}" class="edit-input" placeholder="your@email.com">
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--cl);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Phone Number</label>
        <input type="text" name="phone" value="{{ current_user.phone or '' }}" class="edit-input" placeholder="+20...">
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--cl);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">
          Date of Birth
          <span style="background:#fef3c7;color:#d97706;font-size:10px;padding:2px 7px;border-radius:6px;margin-left:6px;font-weight:700;">🎂 Birthday Rewards</span>
        </label>
        <input type="date" name="date_of_birth" value="{{ current_user.date_of_birth.strftime('%Y-%m-%d') if current_user.date_of_birth else '' }}" class="edit-input">
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--cl);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Default Address</label>
        <input type="text" name="address" value="{{ current_user.address or '' }}" class="edit-input" placeholder="Enter your street, city...">
      </div>

      <div style="margin-bottom:28px;">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--cl);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">New Password <span style="font-weight:400;">(leave blank to keep current)</span></label>
        <div style="position:relative;">
          <input type="password" name="password" id="passwordInput" class="edit-input" placeholder="Minimum 8 characters" style="padding-right:48px;">
          <button type="button" onclick="togglePwd()" id="pwdToggle" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--cl);font-size:14px;">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" id="saveBtn" style="width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;">
        <i class="fas fa-check"></i> Save Changes
      </button>

      <a href="{{ url_for('profile.view_profile') }}" style="display:block;text-align:center;margin-top:16px;color:var(--cl);font-size:14px;font-weight:600;text-decoration:none;">
        ← Cancel and Go Back
      </a>
    </form>
  </div>
</div>

<style>
.edit-input {
  width: 100%;
  padding: 13px 16px;
  border-radius: 12px;
  border: 1.5px solid var(--cb);
  background: var(--bg);
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--c1);
  box-sizing: border-box;
  transition: border-color .2s, box-shadow .2s;
}
.edit-input:focus {
  outline: none;
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,.1);
  background: var(--cw);
}
</style>

<script>
function togglePwd() {
  const inp = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function showFeedback(msg, type) {
  const el = document.getElementById('formFeedback');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = (type === 'success') ? '#dcfce7' : '#fee2e2';
  el.style.color = (type === 'success') ? '#16a34a' : '#dc2626';
}

document.getElementById('updateProfileForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  const originalHtml = btn.innerHTML;
  
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
  btn.disabled = true;

  const formData = new FormData(this);

  // Updated URL to use Blueprint syntax
  fetch("/update", {
    method: 'POST',
    body: formData,
    headers: { 
        'X-Requested-With': 'XMLHttpRequest'
    }
})
  .then(response => {
    if (!response.ok) throw new Error('Response error');
    return response.json();
  })
  .then(data => {
    if (data.status === 'success') {
      showFeedback(data.message, 'success');
      btn.innerHTML = '<i class="fas fa-check"></i> Saved!';
      btn.style.background = '#16a34a';
      setTimeout(() => { window.location.href = "{{ url_for('profile.view_profile') }}"; }, 1000);
    } else {
      showFeedback(data.message, 'error');
      btn.innerHTML = originalHtml;
      btn.disabled = false;
    }
  })
  .catch(error => {
    showFeedback('Connection error or route not found.', 'error');
    btn.innerHTML = originalHtml;
    btn.disabled = false;
  });
});
</script>
{% endblock %}
