{% extends "admin/base_admin.html" %}

{% block admin_title %}Edit {{ item.name }}{% endblock %}

{% block admin_content %}
<div class="admin-page-head">
  <div>
    <h1>Edit menu item</h1>
    <p>{{ item.name }}</p>
  </div>
  <a class="admin-btn admin-btn-outline" href="{{ url_for('admin.menu_list') }}">← Back to menu</a>
</div>

<form class="admin-form" method="post" action="{{ url_for('admin.menu_edit', item_id=item.id) }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="field">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ item.name }}" required maxlength="100">
  </div>

  <div class="field">
    <label for="description">Description</label>
    <textarea id="description" name="description" maxlength="5000">{{ item.description or '' }}</textarea>
  </div>

  <div class="field">
    <label for="category">Category</label>
    <select id="category" name="category" required>
      {% for key, label in categories %}
        <option value="{{ key }}" {% if key == item.category.name %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="field">
    <label for="price">Price (USD)</label>
    <input type="text" id="price" name="price" value="{{ '%.2f'|format(item.price|float) }}" required inputmode="decimal">
  </div>

  <div class="field">
    <label for="stock_quantity">Stock quantity</label>
    <input type="number" id="stock_quantity" name="stock_quantity" min="0" value="{{ item.stock_quantity }}" required>
  </div>

  <div class="field">
    <label for="preparation_time">Prep time (minutes)</label>
    <input type="number" id="preparation_time" name="preparation_time" min="1" value="{{ item.preparation_time or 15 }}" required>
  </div>

  <div class="field">
    <label for="calories">Calories (optional)</label>
    <input type="number" id="calories" name="calories" min="0" value="{{ item.calories if item.calories is not none else '' }}">
  </div>

  <div class="field">
    <label for="ingredients">Ingredients</label>
    <textarea id="ingredients" name="ingredients" maxlength="5000">{{ item.ingredients or '' }}</textarea>
  </div>

  <div class="field checkbox-row">
    <input type="checkbox" id="is_available" name="is_available" {% if item.is_available %}checked{% endif %}>
    <label for="is_available" style="margin:0;font-weight:500;">Available on menu</label>
  </div>

  <div style="margin-top:20px;display:flex;gap:10px;">
    <button type="submit" class="admin-btn admin-btn-primary">Save changes</button>
    <a class="admin-btn admin-btn-outline" href="{{ url_for('admin.menu_list') }}">Cancel</a>
  </div>
</form>
{% endblock %}
