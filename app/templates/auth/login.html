{% extends "base.html" %}
{% block title %}Sign In — AURA{% endblock %}

{% block extra_css %}
<style>
    .auth-container { display:flex; align-items:center; justify-content:center; min-height:80vh; }
    .auth-box       { background:var(--cw); padding:40px; border-radius:var(--r); width:100%; max-width:400px; border:1px solid var(--cb); }
    .auth-title     { text-align:center; font-weight:800; letter-spacing:2px; margin-bottom:30px; }
    .field-wrap     { position:relative; margin-bottom:15px; }
    .auth-input     { width:100%; padding:12px; padding-right:44px; border:1px solid var(--cb); border-radius:8px; outline:none; background:transparent; color:var(--c1); }
    .auth-input:focus { border-color:var(--c2); }
    .eye-btn        { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--cg); font-size:18px; padding:0; line-height:1; }
    .auth-btn       { width:100%; padding:12px; background:var(--c1); color:var(--cw); border:none; border-radius:8px; cursor:pointer; font-weight:600; }
    .msg-banner     { padding:12px; margin-bottom:20px; border-radius:8px; text-align:center; font-size:14px; font-weight:500; border:1px solid transparent; }
    .msg-banner.error   { background:#fee2e2; color:#b91c1c; border-color:#fecaca; }
    .msg-banner.success { background:#dcfce7; color:#15803d; border-color:#bbf7d0; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2 class="auth-title">AURA</h2>
        <div id="message-handler"></div>

        <form id="loginForm" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="field-wrap">
                <input type="text" name="identifier" id="identifier" class="auth-input"
                       placeholder="Email or username" required autofocus autocomplete="username">
            </div>

            <div class="field-wrap">
                <input type="password" name="password" id="password" class="auth-input"
                       placeholder="Password" required>
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">Sign In</button>
        </form>

        <div style="text-align:center; margin-top:25px; font-size:14px; color:var(--cg);">
            New user? <a href="{{ url_for('auth.register') }}" style="color:var(--c2); font-weight:600;">Create Account</a>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const msgHandler = document.getElementById('message-handler');
    const btn        = document.getElementById('submitBtn');
    const identifier = document.getElementById('identifier').value.trim();
    const password   = document.getElementById('password').value;

    // Client-side guard (server validates too, but this saves a round-trip)
    if (!identifier || !password) {
        msgHandler.innerHTML = `<div class="msg-banner error">Please fill in all fields.</div>`;
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'Authenticating…';

    try {
        const response = await fetch("{{ url_for('auth.login') }}", {
            method:  'POST',
            body:    new FormData(this),
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
        });

        const data = await response.json();

        if (response.ok) {
            msgHandler.innerHTML = `<div class="msg-banner success">${data.message}</div>`;
            setTimeout(() => { window.location.href = data.redirect; }, 1000);
        } else {
            msgHandler.innerHTML = `<div class="msg-banner error">${data.message}</div>`;
            document.getElementById('password').value = '';
            btn.disabled    = false;
            btn.textContent = 'Sign In';
        }
    } catch {
        msgHandler.innerHTML = `<div class="msg-banner error">Connection error. Please try again.</div>`;
        btn.disabled    = false;
        btn.textContent = 'Sign In';
    }
});
</script>
{% endblock %}
